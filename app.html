<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Opclaw - OPCи¶…зә§дёӘдҪ“-е…ЁиғҪж•°еӯ—иө„дә§дёҺAIеҲҶиә«еҠ©жүӢ"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Opclaw - еә”з”Ё</title>
    <style>
      /* еҲқе§ӢеҠ иҪҪйҒ®зҪ© - йҳІжӯўзҷҪеұҸ/й»‘еұҸй—ӘзғҒ */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          135deg,
          #fafafa 0%,
          #f5f5f5 50%,
          #fafafa 100%
        );
        background-size: 200% 200%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        transition: opacity 0.4s ease, transform 0.4s ease;
        animation: gradientShift 3s ease infinite;
        perspective: 800px;
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
        transform: scale(1.1);
      }

      /* жёҗеҸҳиғҢжҷҜеҠЁз”» */
      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      /* 3Dйӯ”ж–№е®№еҷЁ */
      #initial-loader .cube-wrapper {
        position: relative;
        width: 60px;
        height: 60px;
        transform-style: preserve-3d;
        animation: cubeRotate 4s linear infinite;
      }

      /* йӯ”ж–№ж—ӢиҪ¬еҠЁз”» */
      @keyframes cubeRotate {
        0% {
          transform: rotateX(-20deg) rotateY(0deg);
        }
        100% {
          transform: rotateX(-20deg) rotateY(360deg);
        }
      }

      /* йӯ”ж–№е…ӯдёӘйқ?*/
      #initial-loader .cube-face {
        position: absolute;
        width: 60px;
        height: 60px;
        border-radius: 8px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.2),
          0 0 20px rgba(139, 92, 246, 0.3);
        backface-visibility: visible;
      }

      /* еүҚйқў - зҙ«иүІ */
      #initial-loader .cube-face.front {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        transform: translateZ(30px);
      }

      /* еҗҺйқў - ж·ұзҙ«иү?*/
      #initial-loader .cube-face.back {
        background: linear-gradient(135deg, #6d28d9 0%, #5b21b6 100%);
        transform: rotateY(180deg) translateZ(30px);
      }

      /* еҸійқў - зІүиүІ */
      #initial-loader .cube-face.right {
        background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
        transform: rotateY(90deg) translateZ(30px);
      }

      /* е·Ұйқў - йқ’иүІ */
      #initial-loader .cube-face.left {
        background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        transform: rotateY(-90deg) translateZ(30px);
      }

      /* дёҠйқў - и“қзҙ«иү?*/
      #initial-loader .cube-face.top {
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        transform: rotateX(90deg) translateZ(30px);
      }

      /* дёӢйқў - йқӣи“қиү?*/
      #initial-loader .cube-face.bottom {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        transform: rotateX(-90deg) translateZ(30px);
      }

      /* е“ҒзүҢж–Үеӯ— */
      #initial-loader .brand-text {
        margin-top: 40px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 4px;
        background: linear-gradient(135deg, #8b5cf6, #ec4899, #06b6d4);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: textGradient 3s ease infinite;
      }

      /* ж–Үеӯ—жёҗеҸҳеҠЁз”» */
      @keyframes textGradient {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      /* иЈ…йҘ°жҖ§е…үжҷ?*/
      #initial-loader .cube-glow {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(139, 92, 246, 0.2) 0%,
          transparent 70%
        );
        animation: glowPulse 2s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes glowPulse {
        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.8;
        }
      }

      /* ж·ұиүІжЁЎејҸйҖӮй…Қ */
      @media (prefers-color-scheme: dark) {
        #initial-loader {
          background: linear-gradient(
            135deg,
            #0d1117 0%,
            #161b22 50%,
            #0d1117 100%
          );
          background-size: 200% 200%;
        }
        #initial-loader .cube-face {
          border-color: rgba(255, 255, 255, 0.1);
          box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1),
            0 0 30px rgba(139, 92, 246, 0.4);
        }
        #initial-loader .cube-face.front {
          background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
        }
        #initial-loader .cube-face.back {
          background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }
        #initial-loader .cube-face.right {
          background: linear-gradient(135deg, #f472b6 0%, #ec4899 100%);
        }
        #initial-loader .cube-face.left {
          background: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
        }
        #initial-loader .cube-face.top {
          background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
        }
        #initial-loader .cube-face.bottom {
          background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }
        #initial-loader .brand-text {
          background: linear-gradient(135deg, #a78bfa, #f472b6, #22d3ee);
          background-size: 200% 200%;
        }
        #initial-loader .cube-glow {
          background: radial-gradient(
            circle,
            rgba(139, 92, 246, 0.3) 0%,
            transparent 70%
          );
        }
      }

      /* з§»еҠЁз«ҜйҖӮй…Қ */
      @media (max-width: 768px) {
        #initial-loader .cube-wrapper,
        #initial-loader .cube-face {
          width: 50px;
          height: 50px;
        }
        #initial-loader .cube-face.front {
          transform: translateZ(25px);
        }
        #initial-loader .cube-face.back {
          transform: rotateY(180deg) translateZ(25px);
        }
        #initial-loader .cube-face.right {
          transform: rotateY(90deg) translateZ(25px);
        }
        #initial-loader .cube-face.left {
          transform: rotateY(-90deg) translateZ(25px);
        }
        #initial-loader .cube-face.top {
          transform: rotateX(90deg) translateZ(25px);
        }
        #initial-loader .cube-face.bottom {
          transform: rotateX(-90deg) translateZ(25px);
        }
        #initial-loader .brand-text {
          font-size: 16px;
          letter-spacing: 3px;
          margin-top: 32px;
        }
        #initial-loader .cube-glow {
          width: 100px;
          height: 100px;
        }
      }

      /* еҮҸе°‘еҠЁз”»еҒҸеҘҪйҖӮй…Қ */
      @media (prefers-reduced-motion: reduce) {
        #initial-loader .cube-wrapper {
          animation: none;
        }
        #initial-loader .brand-text {
          animation: none;
        }
        #initial-loader .cube-glow {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- еҲқе§ӢеҠ иҪҪйҒ®зҪ© -->
    <div id="initial-loader">
      <div class="cube-glow"></div>
      <div class="cube-wrapper">
        <div class="cube-face front"></div>
        <div class="cube-face back"></div>
        <div class="cube-face right"></div>
        <div class="cube-face left"></div>
        <div class="cube-face top"></div>
        <div class="cube-face bottom"></div>
      </div>
      <div class="brand-text">Opclaw</div>
    </div>
    <script type="module">
      window.__APP_CONFIG__ = {
        VITE_SUPABASE_URL: import.meta.env.VITE_SUPABASE_URL,
        VITE_SUPABASE_ANON_KEY: import.meta.env.VITE_SUPABASE_ANON_KEY,
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // йЎөйқўеҠ иҪҪе®ҢжҲҗеҗҺйҡҗи—ҸйҒ®зҪ?
      window.addEventListener("load", function () {
        const loader = document.getElementById("initial-loader");
        if (loader) {
          // з»?React дёҖзӮ№ж—¶й—ҙжқҘжёІжҹ“еҲқе§ӢеҶ…е®№
          setTimeout(function () {
            loader.classList.add("hidden");
            // еҠЁз”»е®ҢжҲҗеҗҺз§»йҷӨе…ғзҙ?
            setTimeout(function () {
              loader.remove();
            }, 300);
          }, 100);
        }
      });
    </script>
  </body>
</html>
